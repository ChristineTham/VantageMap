openapi: 3.1.0
info:
  title: VantageMap Fact Sheets API
  version: 0.1.0
  description: Skeleton contract for fact sheet create, read, update, and delete.
servers:
  - url: https://api.vantagemap.example
paths:
  /v1/fact-sheets:
    post:
      summary: Create fact sheet
      operationId: createFactSheet
      tags: [FactSheets]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactSheetCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactSheet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/fact-sheets/{factSheetId}:
    get:
      summary: Get fact sheet by id
      operationId: getFactSheet
      tags: [FactSheets]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FactSheetId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactSheet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update fact sheet
      operationId: updateFactSheet
      tags: [FactSheets]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FactSheetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactSheetUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactSheet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete fact sheet
      operationId: deleteFactSheet
      tags: [FactSheets]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FactSheetId'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    FactSheetId:
      name: factSheetId
      in: path
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    FactSheet:
      type: object
      required: [id, type, name, lifecycle, createdAt, updatedAt]
      properties:
        id:
          type: string
        type:
          type: string
        name:
          type: string
        lifecycle:
          type: string
          enum: [Plan, Phase In, Active, Phase Out, End of Life]
        ownerId:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FactSheetCreateRequest:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
        name:
          type: string
        lifecycle:
          type: string
        ownerId:
          type: string
        tags:
          type: array
          items:
            type: string
    FactSheetUpdateRequest:
      type: object
      properties:
        name:
          type: string
        lifecycle:
          type: string
        ownerId:
          type: string
        tags:
          type: array
          items:
            type: string
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string