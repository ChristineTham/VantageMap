openapi: 3.1.0
info:
  title: VantageMap Auth API
  version: 0.1.0
  description: Skeleton contract for technical user token and refresh flows.
servers:
  - url: https://api.vantagemap.example
paths:
  /v1/auth/token:
    post:
      summary: Issue access token
      operationId: issueAccessToken
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials
  /v1/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshAccessToken
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid refresh token
components:
  schemas:
    TokenRequest:
      type: object
      required: [clientId, clientSecret]
      properties:
        clientId:
          type: string
        clientSecret:
          type: string
        scope:
          type: string
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    TokenResponse:
      type: object
      required: [accessToken, tokenType, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: Lifetime in seconds.